    <section id="contact-section">

              <nav>

            <div class="contact-body">
              <div class="contact-informantion">

                  <legend>Personal informantion</legend><br>
                  <input type="text"name="name" id="name" value="E-commerce"><br>
                  <input type="email" name="email" value="ecommerce@gmail.com"><br>

                  <input type="text" name="number" value="+38344879645">
                </fieldset>
              </div>

              <form class="contact-form">
                <input type="text" name="name" placeholder="Your First Name" required><br>
                <input type="text" name="last name" placeholder="Your Last Name"><br>
                <input type="email" name="email" placeholder="Your Email" required><br>
                <textarea name="message" placeholder="Your Message..." required></textarea><br>
                <button type="submit">Send Message</button>
              </form>
            </div>
          </div>  
        </div>
