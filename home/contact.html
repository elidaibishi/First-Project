<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact US e-commerce</title>
</head>
<body>

    <section id="contact-section">
        <div class="container">
            <header>
              <nav>
                <ul>
                  <li><a href="../home/home.html">Home</a></li>
                  <li><a href="../home/product.html">Product</a></li>
                  <li><a href="../home/about.html">About</a></li>
                  <li><a href="../home/contact.html">Contact</a></li>
                </ul>
               </nav>
             <form>
                <input type="text" name="search" placeholder="Type here">
                <button>Search</button>
              </form>
            </header>

          <div class="contact-class">
            <div class="contact-text">
                <h1>Contact Us</h1>
                <p>We'd love to hear from you!<br>Fill out the form and we'll get back to you soon.</p>
            </div>

          <form class="contact-form">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Your Message..." required></textarea>
            <button type="submit">Send Message</button>
          </form>
          </div>
        </div>
    </section>

    
</body>
</html>
